<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Children Duty Roster</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap');

:root {
  --green-dark: #114b11;
  --green-mid: #1e6b1e;
  --green-pale: #d4f7d4;
  --yellow: #FFD700;
  --orange: #E67E22;
}

body {
  background: #0f0f1a;
  font-family: 'Barlow', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  font-family: 'Teko', sans-serif;
  color: var(--yellow);
  font-size: 2.5rem;
  margin-bottom: 15px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.roster-card {
  background: #f4faf4;
  border: 4px solid var(--green-dark);
  border-radius: 12px;
  width: 100%;
  max-width: 860px;
}

.roster-body {
  display: flex;
}

.left-section {
  flex: 1;
  border-right: 4px solid var(--green-dark);
}

.right-section {
  flex: 1;
}

.section-header {
  background: var(--green-dark);
  color: white;
  text-align: center;
  padding: 8px;
  font-family: 'Teko';
}

.children-table, .right-table {
  width: 100%;
  border-collapse: collapse;
}

.children-table th, .children-table td,
.right-table th, .right-table td {
  border: 1px solid #999;
  padding: 6px;
  text-align: center;
}

.date-cell {
  background: var(--green-dark);
  color: var(--yellow);
  text-align: center;
  font-family: 'Teko';
  padding: 10px;
}

/* ✅ AARONG STYLE */
.footer-aarong {
  width: 100%;
  text-align: center;
  font-family: 'Teko';
  font-size: 3rem;
  letter-spacing: 6px;
  color: var(--orange);
  font-weight: 700;
  padding: 15px 0;
  border-top: 4px solid var(--green-dark);
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<h1>📋 CHILDREN DUTY ROSTER</h1>

<div class="controls">
  <select id="daySelect">
    <option>Saturday</option>
    <option>Sunday</option>
    <option>Monday</option>
  </select>

  <input type="date" id="dateInput">

  <button onclick="render()">Load</button>
  <button onclick="download()">Download</button>
</div>

<div class="roster-card" id="rosterCard"></div>

<script>
const data = {
  Monday: {
    morning: ["Alvee","Rida"],
    evening: ["Onti","Mou"],
    offday: ["Sumaya"],
  }
};

function render() {
  const day = document.getElementById('daySelect').value;
  const d = data[day] || data["Monday"];

  document.getElementById('rosterCard').innerHTML = `
    <div class="roster-body">
      <div class="left-section">
        <div class="section-header">CHILDREN</div>
        <table class="children-table">
          <tr><th>Name</th><th>M</th><th>E</th></tr>
          ${[...d.morning.map(n=>`<tr><td>${n}</td><td>1</td><td></td></tr>`),
             ...d.evening.map(n=>`<tr><td>${n}</td><td></td><td>1</td></tr>`)].join("")}
        </table>
      </div>

      <div class="right-section">
        <div class="section-header">OFFDAY</div>
        <table class="right-table">
          <tr><td>${d.offday.join(", ")}</td></tr>
        </table>
        <div class="date-cell">${day}</div>
      </div>
    </div>

    <!-- ✅ inside card -->
    <div class="footer-aarong">AARONG</div>
  `;
}

function download() {
  html2canvas(document.getElementById('rosterCard')).then(canvas => {
    const link = document.createElement('a');
    link.download = "roster.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

render();
</script>

</body>
</html>
